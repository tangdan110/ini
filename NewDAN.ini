;================================================================
; 1. 核心精简分流规则 (统一使用 custom_rule)
;================================================================

; --- PS5 专属 UDP 游戏分流 ---
custom_rule=SRC-IP-CIDR,10.10.10.70/32,🎮 PS5联机

; --- 💻 GitHub 专属分流 ---
custom_rule=DOMAIN-KEYWORD,github,💻 GitHub
custom_rule=DOMAIN-SUFFIX,githubusercontent.com,💻 GitHub
custom_rule=DOMAIN-SUFFIX,githubassets.com,💻 GitHub

; --- 🤖 AI 与 Gemini 专属分流 ---
custom_rule=DOMAIN-KEYWORD,gemini,🤖 Gemini
custom_rule=DOMAIN-SUFFIX,generativelanguage.googleapis.com,🤖 Gemini
custom_rule=DOMAIN-SUFFIX,ai.google.dev,🤖 Gemini
custom_rule=DOMAIN-SUFFIX,makersuite.google.com,🤖 Gemini
custom_rule=DOMAIN-SUFFIX,openai.com,🤖 AI
custom_rule=DOMAIN-SUFFIX,oaistatic.com,🤖 AI
custom_rule=DOMAIN-SUFFIX,claude.ai,🤖 AI

; --- 🎥 YouTube 专属分流 ---
custom_rule=DOMAIN-KEYWORD,youtube,🎥 YouTube
custom_rule=DOMAIN-SUFFIX,youtube.com,🎥 YouTube
custom_rule=DOMAIN-SUFFIX,googlevideo.com,🎥 YouTube
custom_rule=DOMAIN-SUFFIX,ytimg.com,🎥 YouTube
custom_rule=DOMAIN-SUFFIX,youtu.be,🎥 YouTube
custom_rule=DOMAIN-SUFFIX,ggpht.com,🎥 YouTube

; --- 🍿 Netflix 专属分流 ---
custom_rule=DOMAIN-KEYWORD,netflix,🍿 Netflix
custom_rule=DOMAIN-SUFFIX,netflix.com,🍿 Netflix
custom_rule=DOMAIN-SUFFIX,netflix.net,🍿 Netflix
custom_rule=DOMAIN-SUFFIX,nflxext.com,🍿 Netflix
custom_rule=DOMAIN-SUFFIX,nflximg.com,🍿 Netflix
custom_rule=DOMAIN-SUFFIX,nflximg.net,🍿 Netflix
custom_rule=DOMAIN-SUFFIX,nflxvideo.net,🍿 Netflix
custom_rule=DOMAIN-SUFFIX,nflxso.net,🍿 Netflix

; --- 🎵 TikTok 专属分流 ---
custom_rule=DOMAIN-SUFFIX,tiktok.com,🎵 TikTok
custom_rule=DOMAIN-SUFFIX,tiktokcdn.com,🎵 TikTok

; --- Max / HBO ---
custom_rule=DOMAIN-SUFFIX,max.com,🇺🇸 Max-US
custom_rule=DOMAIN-SUFFIX,hbomax.com,🇺🇸 Max-US
custom_rule=DOMAIN-KEYWORD,media.max.com,🇸🇬 Max-SG

; --- 国内直连 ---
custom_rule=GEOSITE,CN,🎯 全球直连
custom_rule=GEOIP,CN,🎯 全球直连

; --- 兜底规则 ---
custom_rule=GEOSITE,geolocation-!cn,🚀 节点选择
custom_rule=MATCH,🐟 漏网之鱼

;================================================================
; 2. 策略组定义
;================================================================

custom_proxy_group=🚀 节点选择`select`[]🇭🇰 香港节点`[]🇯🇵 日本节点`[]🇸🇬 加坡节点`[]🇺🇸 美国节点

custom_proxy_group=💻 GitHub`select`[]🇭🇰 香港节点`[]🇺🇸 美国节点`[]🚀 节点选择

custom_proxy_group=🎮 PS5联机`select`[]🇭🇰 香港节点`[]🇯🇵 日本节点`[]🚀 节点选择`[]DIRECT

custom_proxy_group=🤖 Gemini`select`[]🇺🇸 美国节点`[]🚀 节点选择
custom_proxy_group=🤖 AI`select`[]🇺🇸 美国节点`[]🚀 节点选择

custom_proxy_group=🎥 YouTube`select`[]🚀 节点选择`[]🇭🇰 香港节点`[]🇯🇵 日本节点`[]🇸🇬 加坡节点`[]🇺🇸 美国节点
custom_proxy_group=🍿 Netflix`select`[]🇸🇬 加坡节点`[]🇺🇸 美国节点`[]🇭🇰 香港节点`[]🇯🇵 日本节点`[]🚀 节点选择
custom_proxy_group=🎵 TikTok`select`[]🇺🇸 美国节点`[]🚀 节点选择

custom_proxy_group=🇺🇸 Max-US`select`[]🇺🇸 美国节点`[]🇸🇬 加坡节点
custom_proxy_group=🇸🇬 Max-SG`select`[]🇸🇬 加坡节点

custom_proxy_group=🎯 全球直连`select`[]DIRECT
custom_proxy_group=🐟 漏网之鱼`select`[]🚀 节点选择

;================================================================
; 3. 节点地区正则提取
;================================================================
custom_proxy_group=🇭🇰 香港节点`select`.*(香港|HK|Hong\s?Kong|🇭🇰).*
custom_proxy_group=🇯🇵 日本节点`select`.*(日本|川日|东京|大阪|泉日|埼玉|沪日|深日|JP|Japan|🇯🇵).*
custom_proxy_group=🇸🇬 加坡节点`select`.*(新加坡|坡|狮城|SG|Singapore|🇸🇬).*
custom_proxy_group=🇺🇸 美国节点`select`.*(美国|US|USA|United\s?States|🇺🇸).*

enable_rule_generator=true
overwrite_original_rules=true
